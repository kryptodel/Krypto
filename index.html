<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Lex Investigation</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle,#ffe66d,#ff9f1c);font-family:'Luckiest Guy',cursive;overflow:hidden}
body:before{content:"";position:fixed;inset:0;background-image:radial-gradient(rgba(0,0,0,.15) 1.5px,transparent 1.5px);background-size:22px 22px}
.card{position:relative;z-index:1;background:#fff;border:6px solid #000;border-radius:24px;box-shadow:12px 12px #000;width:min(92vw,720px);padding:28px;text-align:center}
.badge{display:inline-block;background:#ff3b30;color:#fff;border:4px solid #000;padding:8px 16px;border-radius:14px;transform:rotate(-4deg)}
h1{font-family:Bangers,cursive;font-size:clamp(2.4rem,7vw,4.5rem);margin:.4em 0;letter-spacing:2px}
p{font-size:clamp(1.1rem,3vw,1.6rem)}
.buttons{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin-top:24px}
button{font:inherit;font-size:1.5rem;padding:14px 30px;border:5px solid #000;border-radius:16px;cursor:pointer;box-shadow:6px 6px #000;transition:.15s}
button:hover{transform:translateY(-3px) scale(1.04)}button:active{transform:translateY(3px);box-shadow:2px 2px #000}
#yes{background:#6cff75}#no{background:#ff7373}
#msg{min-height:90px;margin-top:24px;font-size:1.15rem;line-height:1.5}
.pop{position:fixed;font-family:Bangers,cursive;font-size:2rem;pointer-events:none;animation:pop .8s forwards}
@keyframes pop{to{transform:translateY(-80px) scale(1.6);opacity:0}}
.shake{animation:shake .4s}@keyframes shake{20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
</style></head><body>
<div class="card">
<div class="badge">BREAKING NEWS!</div>
<h1>THE LEX INVESTIGATION</h1>
<p>After extensive research, countless debates, and absolutely zero bias...</p>
<p><b>Is Lex Luthor ugly?</b></p>
<div class="buttons"><button id="yes">YES</button><button id="no">NO</button></div>
<div id="msg"></div>
</div>
<script>
const y=document.getElementById('yes'),n=document.getElementById('no'),m=document.getElementById('msg');
function boom(t){let d=document.createElement('div');d.className='pop';d.textContent=t;d.style.left=(innerWidth/2-30+Math.random()*120-60)+'px';d.style.top=(innerHeight/2-20)+'px';document.body.appendChild(d);setTimeout(()=>d.remove(),800);}
y.onclick=()=>{boom("POW!");m.innerHTML="🏆 <b>Correct!</b><br><br>After reviewing all available evidence, the jury has unanimously agreed that your answer is scientifically accurate.";};
n.onclick=()=>{n.classList.add('shake');setTimeout(()=>n.classList.remove('shake'),400);y.animate([{transform:'scale(1)'},{transform:'scale(1.2)'},{transform:'scale(1)'}],{duration:300});boom("NOPE!");m.innerHTML="🚨 <b>ERROR 404: Valid Opinion Not Found.</b><br><br>Our experts carefully reviewed your answer and immediately replaced it with <b>'YES'</b> for quality assurance purposes.";};
</script></body></html>
