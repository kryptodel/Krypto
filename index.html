<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEX LUTHOR SPECIAL EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Creepster&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Creepster&family=Press+Start+2P&display=swap');
        
        body {
            background: linear-gradient(45deg, #1a1a1a, #4a1a1a);
            font-family: 'Bangers', cursive;
            overflow: hidden;
        }
        
        .comic-panel {
            border: 8px solid #fff;
            box-shadow: 0 0 0 12px #000,
                        0 0 0 16px #ffcc00;
            background: #fff;
            position: relative;
        }
        
        .comic-panel::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            background: repeating-radial-gradient(circle, #000 0px, transparent 2px, transparent 4px);
            opacity: 0.1;
            z-index: -1;
            pointer-events: none;
        }
        
        .speech-bubble {
            position: relative;
            background: #fff;
            border: 6px solid #000;
            padding: 20px;
            font-size: 2.5rem;
            line-height: 1.1;
            text-transform: uppercase;
            box-shadow: 8px 8px 0 #000;
        }
        
        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 50px;
            border: 15px solid transparent;
            border-top-color: #fff;
            border-bottom: 0;
        }
        
        .title {
            font-family: 'Creepster', cursive;
            font-size: 4.5rem;
            color: #ff0000;
            text-shadow: 
                6px 6px 0 #000,
                -4px -4px 0 #000,
                4px -4px 0 #000,
                -4px 4px 0 #000;
            letter-spacing: 4px;
        }
        
        .button-yes {
            transition: all 0.1s cubic-bezier(0.68, -0.6, 0.32, 1.6);
        }
        
        .button-yes:active {
            transform: scale(1.3) rotate(8deg);
        }
        
        .no-button {
            position: relative;
        }
        
        .explosion {
            animation: explode 0.4s forwards;
        }
        
        @keyframes explode {
            0% { transform: scale(1); }
            50% { transform: scale(1.8) rotate(15deg); }
            100% { transform: scale(0.1); opacity: 0; }
        }
        
        .halftone {
            background-image: 
                radial-gradient(circle, #000 1px, transparent 1px);
            background-size: 6px 6px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative">
    <!-- Background effects -->
    <div class="absolute inset-0 halftone opacity-10 pointer-events-none"></div>
    
    <div class="max-w-2xl w-full comic-panel mx-auto">
        <!-- Header -->
        <div class="bg-red-600 text-white text-center py-6 border-b-8 border-black">
            <h1 class="title">LEX LUTHOR EDITION</h1>
            <p class="text-2xl tracking-widest -mt-3">DC COMICS PRESENTS...</p>
        </div>
        
        <!-- Main content -->
        <div class="p-12 bg-white relative">
            <!-- Question bubble -->
            <div class="max-w-lg mx-auto mb-12">
                <div class="speech-bubble text-center mx-auto" style="max-width: 520px;">
                    <p class="text-5xl leading-none">IS LEX LUTHOR UGLY?</p>
                </div>
            </div>
            
            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row gap-8 justify-center items-center mb-16">
                <!-- YES Button -->
                <button onclick="selectYes()" 
                        class="button-yes bg-yellow-400 hover:bg-yellow-300 text-black text-5xl px-16 py-8 border-8 border-black font-bold tracking-widest shadow-2xl">
                    YES
                </button>
                
                <!-- NO Button -->
                <button id="noBtn"
                        onclick="tryNo()"
                        class="no-button bg-red-500 hover:bg-red-600 text-white text-5xl px-16 py-8 border-8 border-black font-bold tracking-widest shadow-2xl">
                    NO
                </button>
            </div>
            
            <!-- Result area -->
            <div id="result" class="min-h-[180px] text-center hidden">
                <div id="message" class="speech-bubble mx-auto max-w-md text-3xl font-bold"></div>
            </div>
        </div>
        
        <!-- Footer comic style -->
        <div class="bg-black text-yellow-300 py-4 text-center text-xl border-t-8 border-white flex items-center justify-center gap-4">
            <span>★</span>
            <span>YOU CAN'T ESCAPE THE TRUTH</span>
            <span>★</span>
        </div>
    </div>
    
    <!-- Floating comic effects -->
    <div class="absolute top-10 left-10 text-6xl opacity-20 pointer-events-none">BOOM!</div>
    <div class="absolute bottom-20 right-10 text-6xl opacity-20 pointer-events-none rotate-12">POW!</div>
    
    <script>
        function selectYes() {
            const result = document.getElementById('result');
            const message = document.getElementById('message');
            
            result.classList.remove('hidden');
            message.innerHTML = `
                <span class="text-green-600">CORRECT CHOICE, CITIZEN!</span><br>
                <span class="text-4xl">Lex Luthor is BALD and UGLY AF 😂</span>
            `;
            message.style.backgroundColor = "#fff";
            confettiBurst();
        }
        
        function tryNo() {
            const noBtn = document.getElementById('noBtn');
            
            // Visual explosion on NO button
            noBtn.classList.add('explosion');
            
            // Force select YES after a tiny delay
            setTimeout(() => {
                noBtn.classList.remove('explosion');
                selectYesButDifferent();
            }, 180);
        }
        
        function selectYesButDifferent() {
            const result = document.getElementById('result');
            const message = document.getElementById('message');
            
            result.classList.remove('hidden');
            message.innerHTML = `
                <span class="text-red-600">NICE TRY, LOSER!</span><br>
                <span class="text-4xl">Even you know Lex is HIDEOUS 😂<br>
                Bald villain with a superiority complex!</span>
            `;
            message.style.backgroundColor = "#fee2e2";
            confettiBurst();
        }
        
        function confettiBurst() {
            // Simple confetti using emoji
            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.textContent = ['💥', '😂', '🦸', '👨‍🦲', '💀'][Math.floor(Math.random()*5)];
                    confetti.style.position = 'fixed';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-50px';
                    confetti.style.fontSize = '2rem';
                    confetti.style.zIndex = '9999';
                    confetti.style.transition = 'all 3s';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => {
                        confetti.style.transform = `translateY(\( {window.innerHeight + 100}px) rotate( \){Math.random()*800}deg)`;
                        confetti.style.opacity = '0';
                    }, 50);
                    
                    setTimeout(() => confetti.remove(), 3500);
                }, i * 8);
            }
        }
        
        // Easter egg: press "L" for extra laughs
        document.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'l') {
                const result = document.getElementById('result');
                if (result.classList.contains('hidden')) {
                    const message = document.getElementById('message');
                    result.classList.remove('hidden');
                    message.innerHTML = `LEX LUTHOR IS SO UGLY EVEN SUPERMAN FEELS BAD FOR HIM 😂`;
                    confettiBurst();
                }
            }
        });
        
        // Tailwind script already included via CDN
    </script>
</body>
</html>
